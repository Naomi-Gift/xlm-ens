name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup component add rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  test:
    name: Workspace Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable
      - name: Install Soroban CLI (optional but useful for integration tests)
        run: cargo install --locked soroban-cli || true
      - name: Run tests
        run: cargo test --workspace
